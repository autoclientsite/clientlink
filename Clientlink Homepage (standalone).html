  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

y: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"29e1195b-f61e-42c2-99ce-e8847734d755\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"c2020863-b09d-4999-9743-f1ba2d6dd3ae\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b5e181cb-e11d-47a2-80f6-5f8dd4c65e76\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"88ec2fd2-d643-4fbe-a7c9-f8a8329ad085\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  /* ============== Brand tokens (lifted from Clientlink DS) ============== */\n  :root{\n    --ink-0:#0B0B0C; --ink-1:#131315; --ink-2:#1B1B1E; --ink-3:#232327;\n    --ink-4:#2C2C31; --ink-5:#3A3A40; --ink-6:#56565E; --ink-7:#7C7C85;\n    --ink-8:#A6A6AD; --ink-9:#D9D9DC; --ink-10:#FFFFFF;\n    --brand-cyan:#2DD4D0; --brand-teal:#14B8B0; --brand-blue:#2FB6E8;\n    --brand-mint:#6FE0A8; --brand-lime:#A8E063; --brand-pink:#E58FB5;\n    --accent:var(--brand-cyan); --accent-hover:#38E0DC; --accent-press:#1FB8B4;\n    --accent-soft:rgba(45,212,208,.16); --accent-ring:rgba(45,212,208,.35);\n    --success:#5DD39E; --warning:#F4B740; --danger:#F26D6D;\n    --line-soft:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16);\n    --brand-gradient:linear-gradient(135deg,#2DD4D0 0%,#6FE0A8 45%,#A8E063 100%);\n    --brand-gradient-wide:linear-gradient(110deg,#2FB6E8 0%,#2DD4D0 30%,#6FE0A8 65%,#A8E063 100%);\n    --shadow-md:0 6px 18px rgba(0,0,0,.40), 0 1px 2px rgba(0,0,0,.5);\n    --shadow-lg:0 24px 48px -12px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.4);\n    --shadow-pop:0 18px 60px -10px rgba(45,212,208,.25), 0 8px 24px rgba(0,0,0,.5);\n    --shadow-inset:inset 0 1px 0 rgba(255,255,255,.06);\n    --ease-out:cubic-bezier(0.22, 1, 0.36, 1);\n    --ease-spring:cubic-bezier(0.34, 1.56, 0.64, 1);\n    --font-display:\"Bebas Neue\", \"Impact\", \"Arial Narrow Bold\", sans-serif;\n    --font-body:\"Manrope\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n    --font-mono:\"JetBrains Mono\", ui-monospace, monospace;\n  }\n\n  *, *::before, *::after { box-sizing:border-box; }\n  html, body { margin:0; padding:0; }\n  html { scroll-behavior:smooth; }\n  body {\n    background:var(--ink-1);\n    color:var(--ink-9);\n    font-family:var(--font-body);\n    font-size:16px;\n    line-height:1.55;\n    -webkit-font-smoothing:antialiased;\n    overflow-x:hidden;\n  }\n  ::selection { background:var(--accent-soft); color:#fff; }\n\n  a { color:inherit; text-decoration:none; }\n\n  /* ============== Typography utilities ============== */\n  .display, .h1, .h2, .h3 {\n    font-family:var(--font-display);\n    font-weight:400; /* Bebas only ships 400 */\n    text-transform:uppercase;\n    letter-spacing:0.005em;\n    line-height:1;\n    color:#fff;\n  }\n  .display { font-size:clamp(60px, 9.5vw, 168px); letter-spacing:-0.005em; }\n  .h1 { font-size:clamp(48px, 6.5vw, 112px); }\n  .h2 { font-size:clamp(40px, 5vw, 88px); }\n  .h3 { font-size:clamp(28px, 3.2vw, 48px); }\n  .eyebrow {\n    font-family:var(--font-body);\n    text-transform:uppercase;\n    letter-spacing:.18em;\n    font-size:12px;\n    font-weight:600;\n    color:var(--brand-cyan);\n  }\n  .lead {\n    font-size:clamp(17px, 1.3vw, 20px);\n    line-height:1.55;\n    color:var(--ink-8);\n    font-weight:400;\n    max-width:56ch;\n  }\n  .micro {\n    font-family:var(--font-body);\n    text-transform:uppercase;\n    letter-spacing:.16em;\n    font-size:11px;\n    font-weight:600;\n    color:var(--ink-7);\n  }\n  .gradient-text {\n    background:var(--brand-gradient-wide);\n    -webkit-background-clip:text;\n    background-clip:text;\n    color:transparent;\n    /* Slight outline for crispness at very large sizes */\n  }\n  .outline-text {\n    color:transparent;\n    -webkit-text-stroke:1.5px rgba(255,255,255,.45);\n  }\n\n  /* ============== Page chrome ============== */\n  .container { max-width:1280px; margin:0 auto; padding:0 32px; }\n  @media (max-width:720px){ .container { padding:0 20px; } }\n\n  /* ============== Nav ============== */\n  .nav {\n    position:fixed; top:0; left:0; right:0; z-index:100;\n    padding:16px 0;\n    transition:all .3s var(--ease-out);\n  }\n  .nav.scrolled {\n    background:rgba(11,11,12,.72);\n    backdrop-filter:blur(20px) saturate(160%);\n    -webkit-backdrop-filter:blur(20px) saturate(160%);\n    border-bottom:1px solid var(--line-soft);\n  }\n  .nav-inner { display:flex; align-items:center; gap:48px; }\n  .brand { display:flex; align-items:center; gap:12px; }\n  .brand-mark {\n    width:32px; height:32px; border-radius:8px;\n    background:var(--ink-1);\n    display:grid; place-items:center;\n    box-shadow:var(--shadow-inset);\n  }\n  .brand-mark img { width:32px; height:32px; display:block; }\n  .brand-name {\n    font-family:var(--font-body);\n    font-weight:700; font-size:17px; letter-spacing:-.01em;\n    color:#fff;\n  }\n  .nav-links { display:flex; gap:28px; margin-left:8px; }\n  .nav-links a {\n    font-size:14px; color:var(--ink-8); font-weight:500;\n    transition:color .15s var(--ease-out);\n  }\n  .nav-links a:hover { color:#fff; }\n  .nav-actions { margin-left:auto; display:flex; gap:12px; align-items:center; }\n  @media (max-width:880px){ .nav-links { display:none; } }\n\n  /* ============== Buttons ============== */\n  .btn {\n    display:inline-flex; align-items:center; gap:8px;\n    height:44px; padding:0 22px;\n    border-radius:10px;\n    font-family:var(--font-body);\n    font-size:14px; font-weight:600;\n    letter-spacing:.01em;\n    border:1px solid transparent;\n    cursor:pointer;\n    transition:all .18s var(--ease-out);\n    white-space:nowrap;\n  }\n  .btn-primary {\n    background:var(--brand-gradient);\n    color:#0B1A1A;\n    box-shadow:0 0 0 0 rgba(45,212,208,0), var(--shadow-md);\n    position:relative;\n  }\n  .btn-primary:hover {\n    box-shadow:0 0 32px rgba(45,212,208,.35), 0 0 0 0 rgba(45,212,208,0), var(--shadow-pop);\n    transform:translateY(-1px);\n  }\n  .btn-primary:active { transform:translateY(1px); }\n  .btn-ghost {\n    background:transparent; color:#fff;\n    border-color:var(--line-strong);\n  }\n  .btn-ghost:hover {\n    background:rgba(255,255,255,.04);\n    border-color:rgba(255,255,255,.28);\n    box-shadow:0 0 24px rgba(45,212,208,.18);\n  }\n  .btn-link {\n    background:transparent; color:var(--ink-9);\n    padding:0; height:auto;\n  }\n  .btn-link:hover { color:var(--brand-cyan); }\n  .btn-sm { height:36px; padding:0 16px; font-size:13px; }\n  .btn-lg { height:54px; padding:0 28px; font-size:15px; }\n\n  .btn-arrow { display:inline-block; transition:transform .2s var(--ease-out); }\n  .btn:hover .btn-arrow { transform:translateX(3px); }\n\n  /* ============== Ambient gradient glow ============== */\n  .glow-tl, .glow-br {\n    position:absolute; pointer-events:none; z-index:0;\n    border-radius:50%;\n    filter:blur(120px);\n    opacity:.45;\n  }\n  .glow-tl {\n    top:-200px; left:-200px; width:780px; height:780px;\n    background:radial-gradient(circle, rgba(45,212,208,.55) 0%, rgba(111,224,168,.25) 35%, transparent 70%);\n  }\n  .glow-br {\n    bottom:-260px; right:-200px; width:680px; height:680px;\n    background:radial-gradient(circle, rgba(168,224,99,.35) 0%, rgba(47,182,232,.18) 40%, transparent 70%);\n    opacity:.3;\n  }\n\n  /* ============== Hero ============== */\n  .hero {\n    position:relative;\n    padding:160px 0 0;\n    overflow:hidden;\n  }\n  .hero-inner { position:relative; z-index:2; }\n\n  .hero-eyebrow-pill {\n    display:inline-flex; align-items:center; gap:10px;\n    height:34px; padding:0 14px 0 8px;\n    border-radius:999px;\n    background:rgba(255,255,255,.04);\n    border:1px solid var(--line-soft);\n    font-size:12.5px; color:var(--ink-9); font-weight:500;\n    margin-bottom:32px;\n  }\n  .hero-eyebrow-pill .dot {\n    width:20px; height:20px; border-radius:999px;\n    background:var(--brand-gradient);\n    display:grid; place-items:center;\n    font-size:11px; color:#0B1A1A; font-weight:700;\n  }\n  .hero-eyebrow-pill .sep { width:1px; height:12px; background:var(--line-strong); }\n  .hero-eyebrow-pill .ar { color:var(--brand-cyan); font-size:11px; }\n\n  .hero-title {\n    max-width:18ch;\n  }\n  .hero-title .line-a { display:block; }\n  .hero-title .line-b { display:block; }\n  .hero-title .line-c { display:block; }\n\n  .hero-meta {\n    display:grid;\n    grid-template-columns:1.1fr 1fr;\n    gap:64px;\n    margin-top:36px;\n    align-items:end;\n  }\n  .hero-meta .lead { font-size:18px; }\n  .hero-cta-row {\n    display:flex; flex-wrap:wrap; gap:14px; align-items:center;\n    margin-top:28px;\n  }\n  .hero-trust {\n    font-size:12.5px; color:var(--ink-7);\n    margin-top:18px;\n    display:flex; align-items:center; gap:10px;\n  }\n  .hero-trust .dot-g { width:8px; height:8px; border-radius:50%; background:var(--success); box-shadow:0 0 10px var(--success); }\n\n  @media (max-width:880px){\n    .hero-meta { grid-template-columns:1fr; gap:24px; }\n  }\n\n  /* ============== Sticky dashboard scroller ============== */\n  .scrolly {\n    position:relative;\n    padding:80px 0 120px;\n  }\n  .scrolly-inner {\n    display:grid;\n    grid-template-columns:1fr 1.1fr;\n    gap:80px;\n    align-items:flex-start;\n  }\n  .scrolly-sticky {\n    position:sticky;\n    top:80px;\n    height:calc(100vh - 120px);\n    max-height:780px;\n    display:flex; align-items:center; justify-content:center;\n  }\n  .scrolly-panels {\n    display:flex; flex-direction:column;\n    gap:0;\n  }\n  .scrolly-panel {\n    min-height:55vh;\n    padding:40px 0;\n    display:flex; flex-direction:column; justify-content:center;\n    opacity:.25;\n    transition:opacity .5s var(--ease-out);\n  }\n  .scrolly-panel.is-active { opacity:1; }\n  .scrolly-panel .eyebrow { display:flex; align-items:center; gap:14px; margin-bottom:18px; }\n  .scrolly-panel .eyebrow .num {\n    font-family:var(--font-display);\n    font-size:48px; line-height:1; color:transparent;\n    -webkit-text-stroke:1px var(--brand-cyan);\n    letter-spacing:0;\n  }\n  .scrolly-panel h3 { margin:0 0 18px; }\n  .scrolly-panel p { color:var(--ink-8); font-size:17px; line-height:1.55; margin:0 0 22px; max-width:46ch; }\n  .scrolly-panel .feat-row { display:flex; flex-direction:column; gap:10px; max-width:46ch; }\n  .scrolly-panel .feat-row .feat {\n    display:flex; align-items:center; gap:12px;\n    font-size:14.5px; color:var(--ink-9);\n  }\n  .scrolly-panel .feat svg { color:var(--brand-cyan); flex:none; }\n\n  @media (max-width:1000px){\n    .scrolly-inner { grid-template-columns:1fr; gap:0; }\n    .scrolly-sticky { position:relative; top:auto; height:auto; max-height:none; padding:40px 0; }\n    .scrolly-panel { min-height:auto; padding:40px 0; opacity:1; }\n  }\n\n  /* ============== Dashboard mockup ============== */\n  .dash-frame {\n    width:100%;\n    max-width:880px;\n    aspect-ratio:16/10;\n    border-radius:18px;\n    background:var(--ink-2);\n    border:1px solid var(--line-soft);\n    box-shadow:var(--shadow-lg) ========== Hero chart - light animated bars ==============\n  const chart = document.getElementById('heroChart');\n  if (chart) {\n    const heights = [42,38,55,49,62,58,71,66,79,74,88,82,91,86,98];\n    chart.innerHTML = heights.map(h => `<div class=\"bar\" style=\"height:${h}%\"><\u002Fdiv>`).join('');\n  }\n\n  // ============== Scrollytelling - swap dashboard views ==============\n  // We promote the hero dashboard frame into a \"sticky-aware\" element by\n  // observing which scrolly panel is active and swapping the .dash-view inside the hero frame.\n\n  const panels = document.querySelectorAll('.scrolly-panel');\n  const heroFrame = document.getElementById('heroFrame');\n  const stickySlot = document.querySelector('.scrolly-sticky');\n  const heroStage = document.getElementById('heroStage');\n\n  const viewMeta = {\n    crm:     { title: 'Dashboard',          sub: 'Today — pipeline at a glance' },\n    funnels: { title: 'Funnel — Demo book', sub: 'Live · last 7 days conversion' },\n    email:   { title: 'Campaigns',          sub: '3 active · drafting Q2 nurture' },\n  };\n\n  function setView(name) {\n    document.querySelectorAll('.dash-view').forEach(v => {\n      v.classList.toggle('is-active', v.dataset.view === name);\n    });\n    document.querySelectorAll('.dash-side .nav-item').forEach(n => {\n      const isMatch = n.dataset.view === name;\n      // only switch active state on items that have a data-view\n      if (n.dataset.view) {\n        n.classList.toggle('active', isMatch && (n.textContent.trim().startsWith('Funnels') || n.textContent.trim().startsWith('Campaigns') || (name === 'crm' && n.textContent.trim().startsWith('Dashboard'))));\n      }\n    });\n    // Force activation: for crm, highlight Dashboard; for funnels, highlight Funnels; for email, highlight Campaigns\n    document.querySelectorAll('.dash-side .nav-item').forEach(n => n.classList.remove('active'));\n    const map = { crm: 'Dashboard', funnels: 'Funnels', email: 'Campaigns' };\n    const wanted = map[name];\n    document.querySelectorAll('.dash-side .nav-item').forEach(n => {\n      if (n.textContent.trim().startsWith(wanted)) n.classList.add('active');\n    });\n    const meta = viewMeta[name];\n    if (meta) {\n      document.getElementById('viewTitle').textContent = meta.title;\n      document.getElementById('viewSub').textContent = meta.sub;\n    }\n  }\n\n  // Move the hero dashboard into the sticky slot once the user scrolls past hero.\n  // Simpler: leave hero frame in place; use IntersectionObserver on panels to swap view.\n  const panelIO = new IntersectionObserver((entries) => {\n    let best = null;\n    let bestRatio = 0;\n    for (const e of entries) {\n      if (e.isIntersecting && e.intersectionRatio > bestRatio) {\n        best = e.target;\n        bestRatio = e.intersectionRatio;\n      }\n    }\n    if (best) {\n      panels.forEach(p => p.classList.toggle('is-active', p === best));\n      const view = best.dataset.view;\n      if (view) setView(view);\n    }\n  }, { threshold: [0.35, 0.6], rootMargin: '-20% 0px -20% 0px' });\n  panels.forEach(p => panelIO.observe(p));\n\n  // ============== Sticky dashboard relocation ==============\n  // The hero frame remains visible in the hero. When the user scrolls into the\n  // scrolly section, the same frame relocates to the sticky slot. We do this\n  // by toggling a CSS class on the hero-stage's parent that switches its\n  // position to fixed within the scrolly section.\n\n  const scrolly = document.getElementById('scrolly');\n  let stickyOn = false;\n  function updateStickyDash() {\n    if (!heroFrame || !scrolly) return;\n    const sr = scrolly.getBoundingClientRect();\n    const hs = document.querySelector('.hero-stage');\n    // Activate sticky mode while the scrolly section is in view\n    const inScrolly = sr.top < window.innerHeight * 0.5 && sr.bottom > window.innerHeight * 0.5;\n    if (inScrolly && !stickyOn) {\n      stickyOn = true;\n      hs.classList.add('hs-pinned');\n    } else if (!inScrolly && stickyOn) {\n      stickyOn = false;\n      hs.classList.remove('hs-pinned');\n    }\n  }\n  // Not using pin-to-fixed approach to avoid layout jumps. Instead, the sticky\n  // slot in .scrolly will visually carry the dashboard via duplication.\n  // Build a clone of the hero frame inside the sticky slot.\n  if (heroFrame && stickySlot) {\n    const clone = heroFrame.cloneNode(true);\n    clone.id = 'stickyFrameClone';\n    clone.style.display = 'block';\n    stickySlot.innerHTML = '';\n    stickySlot.appendChild(clone);\n  }\n\n  // Override setView to update BOTH frames (hero + clone).\n  function setViewBoth(name) {\n    [heroFrame, document.getElementById('stickyFrameClone')].forEach(frame => {\n      if (!frame) return;\n      frame.querySelectorAll('.dash-view').forEach(v => {\n        v.classList.toggle('is-active', v.dataset.view === name);\n      });\n      frame.querySelectorAll('.dash-side .nav-item').forEach(n => n.classList.remove('active'));\n      const map = { crm: 'Dashboard', funnels: 'Funnels', email: 'Campaigns' };\n      const wanted = map[name];\n      frame.querySelectorAll('.dash-side .nav-item').forEach(n => {\n        if (n.textContent.trim().startsWith(wanted)) n.classList.add('active');\n      });\n      const meta = viewMeta[name];\n      if (meta) {\n        const t = frame.querySelector('#viewTitle, .dash-topbar .title');\n        const s = frame.querySelector('#viewSub, .dash-topbar .sub');\n        if (t) t.textContent = meta.title;\n        if (s) s.textContent = meta.sub;\n      }\n    });\n  }\n\n  // Replace the simple setView with the dual variant\n  const _origPanelIO = panelIO;\n  panelIO.disconnect();\n  const panelIO2 = new IntersectionObserver((entries) => {\n    let best = null;\n    let bestRatio = 0;\n    for (const e of entries) {\n      if (e.isIntersecting && e.intersectionRatio > bestRatio) {\n        best = e.target;\n        bestRatio = e.intersectionRatio;\n      }\n    }\n    if (best) {\n      panels.forEach(p => p.classList.toggle('is-active', p === best));\n      const view = best.dataset.view;\n      if (view) setViewBoth(view);\n    }\n  }, { threshold: [0.35, 0.6], rootMargin: '-25% 0px -25% 0px' });\n  panels.forEach(p => panelIO2.observe(p));\n\n  // ============== Hide hero frame as we enter scrolly so the clone takes over ==============\n  // Visual continuity: fade the hero frame out as the sticky clone comes in.\n  const fadeIO = new IntersectionObserver((entries) => {\n    for (const e of entries) {\n      const hs = document.querySelector('.hero-stage');\n      if (e.isIntersecting) {\n        hs.style.opacity = '0';\n        hs.style.transform = 'translateY(-30px)';\n      } else if (e.boundingClientRect.top > 0) {\n        // scrolly is below — hero visible\n        hs.style.opacity = '';\n        hs.style.transform = '';\n      }\n    }\n  }, { threshold: 0.15 });\n  fadeIO.observe(scrolly);\n\n  // ============== Mouse parallax on hero frame ==============\n  const stage = document.getElementById('heroStage');\n  if (stage && matchMedia('(pointer:fine)').matches) {\n    stage.addEventListener('mousemove', (e) => {\n      const rect = stage.getBoundingClientRect();\n      const mx = ((e.clientX - rect.left) / rect.width - 0.5) * 2;\n      const my = ((e.clientY - rect.top) / rect.height - 0.5) * 2;\n      heroFrame.style.transform = `perspective(2000px) rotateX(${0.5 - my * 1.2}deg) rotateY(${mx * 1.2}deg)`;\n    });\n    stage.addEventListener('mouseleave', () => {\n      heroFrame.style.transform = 'perspective(2000px) rotateX(0.5deg)';\n    });\n  }\n\n  // ============== Feature card spotlight hover ==============\n  document.querySelectorAll('.feat-card').forEach(card => {\n    card.addEventListener('mousemove', (e) => {\n      const r = card.getBoundingClientRect();\n      card.style.setProperty('--mx', `${((e.clientX - r.left)/r.width)*100}%`);\n      card.style.setProperty('--my', `${((e.clientY - r.top)/r.height)*100}%`);\n    });\n  });\n\n  // ============== Subtle parallax on hero glow ==============\n  const glow = document.querySelector('.hero .glow-tl');\n  if (glow) {\n    window.addEventListener('scroll', () => {\n      const y = window.scrollY;\n      if (y < 1200) glow.style.transform = `translate(${y * 0.05}px, ${y * 0.18}px)`;\n    }, { passive: true });\n  }\n\n  // ============== Hero stats: subtle count up ==============\n  // Skip count-up for simplicity — values displayed statically.\n\n  // ============== Smooth scroll for in-page anchors ==============\n  document.querySelectorAll('a[href^=\"#\"]').forEach(a => {\n    a.addEventListener('click', (e) => {\n      const href = a.getAttribute('href');\n      if (href.length < 2) return;\n      const t = document.querySelector(href);\n      if (!t) return;\n      e.preventDefault();\n      const top = t.getBoundingClientRect().top + window.scrollY - 60;\n      window.scrollTo({ top, behavior: 'smooth' });\n    });\n  });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
