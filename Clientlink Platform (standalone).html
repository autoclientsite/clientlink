  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

rmal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"c61c8163-d0f1-4208-92e7-1d6414236d90\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"bb953665-0145-4c51-9085-96885610c913\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"caeb4251-d9cb-4a49-9c0a-351641870c94\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"53316418-db1b-4897-ab29-fd2067a4fc9d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =====================================================================\n   Clientlink — shared site styles\n   Loaded by every page. Page-specific CSS lives inline per-page.\n   ===================================================================== */\n\n:root{\n  --ink-0:#0B0B0C; --ink-1:#131315; --ink-2:#1B1B1E; --ink-3:#232327;\n  --ink-4:#2C2C31; --ink-5:#3A3A40; --ink-6:#56565E; --ink-7:#7C7C85;\n  --ink-8:#A6A6AD; --ink-9:#D9D9DC; --ink-10:#FFFFFF;\n  --brand-cyan:#2DD4D0; --brand-teal:#14B8B0; --brand-blue:#2FB6E8;\n  --brand-mint:#6FE0A8; --brand-lime:#A8E063; --brand-pink:#E58FB5;\n  --accent:var(--brand-cyan); --accent-hover:#38E0DC; --accent-press:#1FB8B4;\n  --accent-soft:rgba(45,212,208,.16); --accent-ring:rgba(45,212,208,.35);\n  --success:#5DD39E; --warning:#F4B740; --danger:#F26D6D;\n  --line-soft:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16);\n  --brand-gradient:linear-gradient(135deg,#2DD4D0 0%,#6FE0A8 45%,#A8E063 100%);\n  --brand-gradient-wide:linear-gradient(110deg,#2FB6E8 0%,#2DD4D0 30%,#6FE0A8 65%,#A8E063 100%);\n  --shadow-md:0 6px 18px rgba(0,0,0,.40), 0 1px 2px rgba(0,0,0,.5);\n  --shadow-lg:0 24px 48px -12px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.4);\n  --shadow-pop:0 18px 60px -10px rgba(45,212,208,.25), 0 8px 24px rgba(0,0,0,.5);\n  --shadow-inset:inset 0 1px 0 rgba(255,255,255,.06);\n  --ease-out:cubic-bezier(0.22, 1, 0.36, 1);\n  --ease-spring:cubic-bezier(0.34, 1.56, 0.64, 1);\n  --font-display:\"Bebas Neue\", \"Impact\", \"Arial Narrow Bold\", sans-serif;\n  --font-body:\"Manrope\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-mono:\"JetBrains Mono\", ui-monospace, monospace;\n}\n\n*, *::before, *::after { box-sizing:border-box; }\nhtml, body { margin:0; padding:0; }\nhtml { scroll-behavior:smooth; }\nbody {\n  background:var(--ink-1);\n  color:var(--ink-9);\n  font-family:var(--font-body);\n  font-size:16px;\n  line-height:1.55;\n  -webkit-font-smoothing:antialiased;\n  overflow-x:hidden;\n}\n::selection { background:var(--accent-soft); color:#fff; }\na { color:inherit; text-decoration:none; }\n\n/* ============== Typography ============== */\n.display, .h1, .h2, .h3 {\n  font-family:var(--font-display);\n  font-weight:400;\n  text-transform:uppercase;\n  letter-spacing:0.005em;\n  line-height:1;\n  color:#fff;\n  margin:0;\n}\n.display { font-size:clamp(60px, 9.5vw, 168px); letter-spacing:-0.005em; }\n.h1 { font-size:clamp(48px, 6.5vw, 112px); }\n.h2 { font-size:clamp(40px, 5vw, 88px); }\n.h3 { font-size:clamp(28px, 3.2vw, 48px); }\n.eyebrow {\n  font-family:var(--font-body);\n  text-transform:uppercase;\n  letter-spacing:.18em;\n  font-size:12px;\n  font-weight:600;\n  color:var(--brand-cyan);\n  display:inline-flex; align-items:center; gap:10px;\n}\n.eyebrow.with-rule::before {\n  content:\"\"; width:24px; height:1px; background:var(--brand-cyan);\n}\n.lead {\n  font-size:clamp(17px, 1.3vw, 20px);\n  line-height:1.55;\n  color:var(--ink-8);\n  font-weight:400;\n  max-width:56ch;\n}\n.micro {\n  font-family:var(--font-body);\n  text-transform:uppercase;\n  letter-spacing:.16em;\n  font-size:11px;\n  font-weight:600;\n  color:var(--ink-7);\n}\n.gradient-text {\n  background:var(--brand-gradient-wide);\n  -webkit-background-clip:text; background-clip:text;\n  color:transparent;\n}\n.outline-text {\n  color:transparent;\n  -webkit-text-stroke:1.5px rgba(255,255,255,.45);\n}\n\n/* ============== Layout ============== */\n.container { max-width:1280px; margin:0 auto; padding:0 32px; }\n@media (max-width:720px){ .container { padding:0 20px; } }\nsection { position:relative; }\n.section { padding:140px 0; position:relative; }\n.section-sm { padding:96px 0; }\n.section-head { margin-bottom:80px; max-width:1100px; }\n.section-head .eyebrow { margin-bottom:18px; }\n\n/* ============== Nav ============== */\n.nav {\n  position:fixed; top:0; left:0; right:0; z-index:100;\n  padding:16px 0;\n  transition:all .3s var(--ease-out);\n}\n.nav.scrolled {\n  background:rgba(11,11,12,.72);\n  backdrop-filter:blur(20px) saturate(160%);\n  -webkit-backdrop-filter:blur(20px) saturate(160%);\n  border-bottom:1px solid var(--line-soft);\n}\n.nav-inner { display:flex; align-items:center; gap:48px; }\n.brand { display:flex; align-items:center; gap:12px; }\n.brand-mark {\n  width:32px; height:32px; border-radius:8px;\n  background:var(--ink-1);\n  display:grid; place-items:center;\n  box-shadow:var(--shadow-inset);\n}\n.brand-mark img { width:32px; height:32px; display:block; }\n.brand-name {\n  font-family:var(--font-body);\n  font-weight:700; font-size:17px; letter-spacing:-.01em;\n  color:#fff;\n}\n.nav-links { display:flex; gap:28px; margin-left:8px; }\n.nav-links a {\n  font-size:14px; color:var(--ink-8); font-weight:500;\n  transition:color .15s var(--ease-out);\n  position:relative;\n}\n.nav-links a:hover { color:#fff; }\n.nav-links a.active { color:#fff; }\n.nav-links a.active::after {\n  content:\"\"; position:absolute; left:0; right:0; bottom:-6px;\n  height:2px; background:var(--brand-gradient); border-radius:2px;\n}\n.nav-actions { margin-left:auto; display:flex; gap:12px; align-items:center; }\n@media (max-width:880px){ .nav-links { display:none; } }\n\n/* ============== Buttons ============== */\n.btn {\n  display:inline-flex; align-items:center; gap:8px;\n  height:44px; padding:0 22px;\n  border-radius:10px;\n  font-family:var(--font-body);\n  font-size:14px; font-weight:600;\n  letter-spacing:.01em;\n  border:1px solid transparent;\n  cursor:pointer;\n  transition:all .18s var(--ease-out);\n  white-space:nowrap;\n}\n.btn-primary {\n  background:var(--brand-gradient);\n  color:#0B1A1A;\n  box-shadow:0 0 0 0 rgba(45,212,208,0), var(--shadow-md);\n  position:relative;\n}\n.btn-primary:hover {\n  box-shadow:0 0 32px rgba(45,212,208,.35), var(--shadow-pop);\n  transform:translateY(-1px);\n}\n.btn-primary:active { transform:translateY(1px); }\n.btn-ghost {\n  background:transparent; color:#fff;\n  border-color:var(--line-strong);\n}\n.btn-ghost:hover {\n  background:rgba(255,255,255,.04);\n  border-color:rgba(255,255,255,.28);\n  box-shadow:0 0 24px rgba(45,212,208,.18);\n}\n.btn-link {\n  background:transparent; color:var(--ink-9);\n  padding:0; height:auto;\n}\n.btn-link:hover { color:var(--brand-cyan); }\n.btn-sm { height:36px; padding:0 16px; font-size:13px; }\n.btn-lg { height:54px; padding:0 28px; font-size:15px; }\n.btn-arrow { display:inline-block; transition:transform .2s var(--ease-out); }\n.btn:hover .btn-arrow { transform:translateX(3px); }\n\n/* ============== Glow blobs ============== */\n.glow-tl, .glow-br, .glow-c {\n  position:absolute; pointer-events:none; z-index:0;\n  border-radius:50%; filter:blur(120px);\n}\n.glow-tl {\n  top:-200px; left:-200px; width:780px; height:780px;\n  background:radial-gradient(circle, rgba(45,212,208,.55) 0%, rgba(111,224,168,.25) 35%, transparent 70%);\n  opacity:.45;\n}\n.glow-br {\n  bottom:-260px; right:-200px; width:680px; height:680px;\n  background:radial-gradient(circle, rgba(168,224,99,.35) 0%, rgba(47,182,232,.18) 40%, transparent 70%);\n  opacity:.3;\n}\n.glow-c {\n  left:50%; top:50%; transform:translate(-50%,-50%);\n  width:80%; height:600px;\n  background:radial-gradient(ellipse at center, rgba(45,212,208,.20) 0%, rgba(168,224,99,.08) 35%, transparent 70%);\n  filter:blur(60px);\n  opacity:.8;\n}\n\n/* ============== Page hero (shared compact hero for sub-pages) ============== */\n.page-hero {\n  position:relative;\n  padding:200px 0 100px;\n  overflow:hidden;\n}\n.page-hero .container { position:relative; z-index:2; }\n.page-hero .eyebrow { margin-bottom:24px; }\n.page-hero .lead { margin-top:28px; font-size:20px; max-width:60ch; }\n\n/* ============== Footer ============== */\nfooter {\n  border-top:1px solid var(--line-soft);\n  padding:64px 0 32px;\n  background:var(--ink-0);\n  position:relative; z-index:2;\n}\n.footer-top {\n  display:grid;\n  grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;\n  gap:48px;\n  margin-bottom:56px;\n}\n.footer-top h5 {\n  font-size:11px; text-transform:uppercase; letter-spacing:.16em;\n  color:var(--ink-7); font-weight:600;\n  margin:0 0 18px;\n  font-family:var(--font-body);\n}\n.footer-top ul { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:11px; }\n.footer-top a {\n  font-size:14px; color:var(--ink-9);\n  transition:color .15s var(--ease-out);\n}\n.footer-top a:hover { color:var(--brand-cyan); }\n.footer-top .brandcol p { color:var(--ink-7); font-size:13px; line-height:1.55; margin:14px 0 0; max-width:36ch; }\n.footer-bottom {\n  display:flex; align-items:center; gap:16px;\n  padding-top:24px; border-top:1px solid var(--line-soft);\n  font-size:12.5px; color:var(--ink-7);\n  flex-wrap:wrap;\n}\n.footer-bottom .copy { flex:1; }\n.footer-bottom .links { display:flex; gap:24px; }\n.footer-bottom .links a:hover { color:var(--ink-9); }\n@media (max-width:880px){\n  .footer-top { grid-template-columns:1fr 1fr; gap:32px; }\n}\n\n/* ============== Cards ============== */\n.card {\n  background:var(--ink-2);\n  border:1px solid var(--line-soft);\n  border-radius:18px;\n  box-shadow:var(--shadow-md), var(--shadow-inset);\n  padding:32px;\n  transition:all .25s var(--ease-out);\n}\n.card.hoverable:hover {\n  background:var(--ink-3);\n  box-shadow:var(--shadow-pop), var(--shadow-inset);\n  transform:translateY(-3px);\n}\n\n/* ============== Reveal ============== */\n.reveal {\n  opacity:0; transform:translateY(20px);\n  transition:opacity .8s var(--ease-out), transform .8s var(--ease-out);\n}\n.reveal.in { opacity:1; transform:translateY(0); }\n\n/* ============== Final CTA (shared) ============== */\n.final-cta {\n  border-top:1px solid var(--line-soft);\n  position:relative; overflow:hidden;\n  padding:140px 0;\n}\n.final-cta .inner {\n  text-align:center; max-width:980px; margin:0 auto;\n  position:relative; z-index:2;\n}\n.final-cta h2 { font-size:clamp(56px, 9vw, 144px); margin:0 0 28px; }\n.final-cta .lead { margin:0 auto 40px; font-size:18px; color:var(--ink-8); max-width:60ch; }\n.final-cta .row { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }\n.final-cta .reassure {\n  margin-top:28px;\n  font-size:12.5px; color:var(--ink-7);\n  display:flex; gap:24px; justify-content:center; flex-wrap:wrap;\n}\n.final-cta .reassure span { display:flex; align-items:center; gap:6px; }\n.final-cta .reassure svg { color:var(--success); }\n.final-cta .bg-glow {\n  position:absolute; left:50%; top:50%;\n  transform:translate(-50%,-50%);\n  width:120%; height:600px;\n  background:radial-gradient(ellip
